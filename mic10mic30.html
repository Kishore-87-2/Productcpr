<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonel MPI-520 / MPI-525 vs Competitors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 30px 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #4EC0E0, #2A9BC9);
            color: white;
            padding: 25px;
            text-align: center;
        }
        h1 { font-size: 28px; font-weight: 600; }

        .controls {
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: end;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .select-group {
            flex: 1;
            min-width: 280px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        select:focus {
            border-color: #4EC0E0;
            box-shadow: 0 0 0 3px rgba(78, 192, 224, 0.2);
        }

        .buttons {
            padding: 25px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: white;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 160px;
            transition: all 0.3s;
        }
        .btn-compare { background: #4EC0E0; color: white; }
        .btn-compare:hover { background: #2A9BC9; }
        .btn-all { background: #28a745; color: white; }
        .btn-all:hover { background: #218838; }
        .btn-export { background: #4EC0E0; color: white; }
        .btn-export:hover { background: #2A9BC9; }
        .btn-clear { background: #6c757d; color: white; }
        .btn-clear:hover { background: #5a6268; }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f1f3f5; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        #loading { padding: 20px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>   </h1>
        </header>

        <div class="controls">
            <div class="select-group">
                <label>Select Sonel Product:</label>
                <select id="productSelect" onchange="updateCompetitorOptions()"></select>
            </div>
            <div class="select-group">
                <label>Competitor 1:</label>
                <select id="competitorSelect" onchange="loadComparisonTable()"></select>
            </div>
            <div class="select-group">
                <label>Competitor 2:</label>
                <select id="competitorSelect2" onchange="loadComparisonTable()">
                    <option value="None">None</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-compare" onclick="loadComparisonTable()">Compare Selected</button>
            <button class="btn-all" onclick="compareAllProducts()">Compare All</button>
            <button class="btn-export" onclick="exportToPDF()">Export Selected</button>
            <button class="btn-export" onclick="exportAllToPDF()">Export All</button>
            <button class="btn-clear" onclick="clearSelection()">Clear Selection</button>
        </div>

        <div id="loading">Loading product data...</div>
        <table id="comparisonTable"></table>
    </div>

    <script>
        const DATA_URL = "https://script.google.com/macros/s/AKfycbyP9cse7xEhJ3NXT2tKE5TgyhkVS1UTDW336bUockRWcTZbOjrNW7h6ErtqbYvHCtwxmA/exec";
        
        let productComparisonData = {};
        let featuresOrder = [];
        let sonelProducts = [];
        let allProducts = [];

        async function loadData() {
            try {
                const res = await fetch(DATA_URL);
                const data = await res.json();
                
                productComparisonData = data.products || {};
                featuresOrder = data.features || [];

                allProducts = Object.keys(productComparisonData);
                
                // Filter only Sonel products for main dropdown
                sonelProducts = allProducts.filter(p => p.toLowerCase().includes("sonel"));

                if (sonelProducts.length === 0) {
                    sonelProducts = allProducts; // fallback
                }

                populateSonelDropdown();
                document.getElementById("loading").style.display = "none";
            } catch (e) {
                document.getElementById("loading").innerHTML = "❌ Failed to load data";
            }
        }

        function populateSonelDropdown() {
            const select = document.getElementById("productSelect");
            select.innerHTML = sonelProducts
                .map(p => `<option value="${p}">${p}</option>`).join("");
            
            updateCompetitorOptions();
        }

        function updateCompetitorOptions() {
            const selectedMain = document.getElementById("productSelect").value;

            // Competitors can be any product except the selected main one
            const available = allProducts.filter(p => p !== selectedMain);

            // Competitor 1
            document.getElementById("competitorSelect").innerHTML = available
                .map(c => `<option value="${c}">${c}</option>`).join("");

            // Competitor 2
            document.getElementById("competitorSelect2").innerHTML = 
                '<option value="None">None</option>' + 
                available.map(c => `<option value="${c}">${c}</option>`).join("");

            loadComparisonTable();
        }

        function loadComparisonTable() {
            const main = document.getElementById("productSelect").value;
            const c1 = document.getElementById("competitorSelect").value;
            const c2 = document.getElementById("competitorSelect2").value;

            if (!main) {
                document.getElementById("comparisonTable").innerHTML = 
                    `<tr><td colspan="4" style="text-align:center;padding:40px;color:#666;">
                        Please select a Sonel Product
                    </td></tr>`;
                return;
            }

            let html = `<tr><th>Feature</th><th>${main}</th><th>${c1}</th>`;
            if (c2 !== "None") html += `<th>${c2}</th>`;
            html += `</tr>`;

            featuresOrder.forEach(f => {
                html += `<tr>
                    <td><strong>${f}</strong></td>
                    <td>${productComparisonData[main]?.[f] || "NA"}</td>
                    <td>${productComparisonData[c1]?.[f] || "NA"}</td>`;
                if (c2 !== "None") {
                    html += `<td>${productComparisonData[c2]?.[f] || "NA"}</td>`;
                }
                html += `</tr>`;
            });

            document.getElementById("comparisonTable").innerHTML = html;
        }

        function compareAllProducts() {
            const products = Object.keys(productComparisonData);
            let html = `<tr><th>Feature</th>`;
            products.forEach(p => html += `<th>${p}</th>`);
            html += `</tr>`;

            featuresOrder.forEach(f => {
                html += `<tr><td><strong>${f}</strong></td>`;
                products.forEach(p => {
                    html += `<td>${productComparisonData[p]?.[f] || "NA"}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById("comparisonTable").innerHTML = html;
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            html2canvas(document.getElementById("comparisonTable"), {scale: 2}).then(canvas => {
                const pdf = new jsPDF("l", "mm", "a4");
                const img = canvas.toDataURL("image/png");
                pdf.text("Product Comparison", 15, 15);
                pdf.addImage(img, "PNG", 10, 25, 280, 0);
                pdf.save("sonel-comparison.pdf");
            });
        }

        function exportAllToPDF() {
            compareAllProducts();
            setTimeout(exportToPDF, 300);
        }

        function clearSelection() {
            document.getElementById("competitorSelect2").value = "None";
            loadComparisonTable();
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
