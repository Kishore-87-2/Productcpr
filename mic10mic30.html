<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonel MIC 10/MIC 30 vs Competitors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
   
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 30px 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #4EC0E0, #2A9BC9);
            color: white;
            padding: 20px 25px;
            text-align: center;
            position: relative; /* Important for absolute positioning */
        }
        .home-btn {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 18px;
            background: rgba(255,255,255,0.9);
            color: #2A9BC9;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .home-btn:hover {
            background: white;
            transform: translateY(-50%) scale(1.05);
        }
        h1 { 
            font-size: 28px; 
            font-weight: 600; 
            margin: 0;
        }
        .controls {
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: end;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        /* Rest of your existing styles remain the same */
        .select-group {
            flex: 1;
            min-width: 280px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        select:focus {
            border-color: #4EC0E0;
            box-shadow: 0 0 0 3px rgba(78, 192, 224, 0.2);
        }
        .buttons {
            padding: 25px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: white;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 160px;
            transition: all 0.3s;
        }
        .btn-compare { background: #4EC0E0; color: white; }
        .btn-compare:hover { background: #2A9BC9; }
        .btn-all { background: #28a745; color: white; }
        .btn-all:hover { background: #218838; }
        .btn-export { background: #4EC0E0; color: white; }
        .btn-export:hover { background: #2A9BC9; }
        .btn-clear { background: #6c757d; color: white; }
        .btn-clear:hover { background: #5a6268; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f1f3f5; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        #loading { padding: 20px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <!-- Home Button -->
            <a href="page2.html" class="home-btn">
                ← Home
            </a>
            <h1>Sonel MIC 10/MIC 30 vs Competitors</h1>
        </header>

        <div class="controls">
            <div class="select-group">
                <label>Select Sonel Product:</label>
                <select id="productSelect" onchange="updateCompetitorOptions()"></select>
            </div>
            <div class="select-group">
                <label>Competitor 1:</label>
                <select id="competitorSelect" onchange="loadComparisonTable()"></select>
            </div>
            <div class="select-group">
                <label>Competitor 2:</label>
                <select id="competitorSelect2" onchange="loadComparisonTable()">
                    <option value="None">None</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-compare" onclick="loadComparisonTable()">Compare Selected</button>
            <button class="btn-all" onclick="compareAllProducts()">Compare All</button>
            <button class="btn-export" onclick="exportToPDF()">Export Selected</button>
            <button class="btn-export" onclick="exportAllToPDF()">Export All</button>
            <button class="btn-clear" onclick="clearSelection()">Clear Selection</button>
        </div>

        <div id="loading">Loading product data...</div>
        <table id="comparisonTable"></table>
    </div>

    <script>
        // Your existing script remains unchanged
        const DATA_URL = "https://script.google.com/macros/s/AKfycbyP9cse7xEhJ3NXT2tKE5TgyhkVS1UTDW336bUockRWcTZbOjrNW7h6ErtqbYvHCtwxmA/exec";
       
        let productComparisonData = {};
        let featuresOrder = [];
        let sonelProducts = [];
        let allProducts = [];

        async function loadData() {
            try {
                const res = await fetch(DATA_URL);
                const data = await res.json();
               
                productComparisonData = data.products || {};
                featuresOrder = data.features || [];
                allProducts = Object.keys(productComparisonData);
               
                sonelProducts = allProducts.filter(p => p.toLowerCase().includes("sonel"));
                if (sonelProducts.length === 0) {
                    sonelProducts = allProducts;
                }
                populateSonelDropdown();
                document.getElementById("loading").style.display = "none";
            } catch (e) {
                document.getElementById("loading").innerHTML = "❌ Failed to load data";
            }
        }

        // ... (rest of your JavaScript functions remain the same)
        function populateSonelDropdown() {
            const select = document.getElementById("productSelect");
            select.innerHTML = sonelProducts
                .map(p => `<option value="${p}">${p}</option>`).join("");
            updateCompetitorOptions();
        }

        function updateCompetitorOptions() {
            const selectedMain = document.getElementById("productSelect").value;
            const available = allProducts.filter(p => p !== selectedMain);
            
            document.getElementById("competitorSelect").innerHTML = available
                .map(c => `<option value="${c}">${c}</option>`).join("");
            
            document.getElementById("competitorSelect2").innerHTML =
                '<option value="None">None</option>' +
                available.map(c => `<option value="${c}">${c}</option>`).join("");
            
            loadComparisonTable();
        }

        function loadComparisonTable() { /* ... your existing function ... */ }
        function compareAllProducts() { /* ... */ }
        function exportToPDF() { /* ... */ }
        function exportAllToPDF() { /* ... */ }
        function clearSelection() { /* ... */ }

        // Initialize
        loadData();
    </script>
</body>
</html>
